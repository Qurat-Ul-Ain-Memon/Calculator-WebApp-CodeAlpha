<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Calculator</title>
</head>
<body>
  <section class="calculator-section">
  <h2>Calculator Web App</h2>
  <p>Simple and responsive calculator built with HTML, CSS, and JavaScript.</p>

  <div class="calculator">
    <input type="text" class="display" id="display" placeholder="0" disabled>

    <div class="buttons">
      <!-- Row 1 -->
      <button onclick="clearDisplay()">C</button>
      <button onclick="appendOperator('/')">/</button>
      <button onclick="appendOperator('*')">*</button>
      <button onclick="appendOperator('-')">-</button>

      <!-- Row 2 -->
      <button onclick="appendNumber('7')">7</button>
      <button onclick="appendNumber('8')">8</button>
      <button onclick="appendNumber('9')">9</button>
      <button onclick="appendOperator('+')">+</button>

      <!-- Row 3 -->
      <button onclick="appendNumber('4')">4</button>
      <button onclick="appendNumber('5')">5</button>
      <button onclick="appendNumber('6')">6</button>
      <button onclick="calculateResult()" style="grid-row: span 2;">=</button>

      <!-- Row 4 -->
      <button onclick="appendNumber('1')">1</button>
      <button onclick="appendNumber('2')">2</button>
      <button onclick="appendNumber('3')">3</button>

      <!-- Row 5 -->
      <button onclick="appendNumber('0')" style="grid-column: span 2;">0</button>
      <button onclick="appendDot()">.</button>
    </div>
  </div>
</section>

<script src="script.js"></script>
</body>
</html>
